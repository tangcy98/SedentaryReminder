name: SedentaryReminder
options:
  bundleIdPrefix: com.sedentary
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: NO

targets:
  SedentaryReminder:
    type: application
    platform: macOS
    sources:
      - path: SedentaryReminder/Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.sedentary.reminder
        PRODUCT_NAME: SedentaryReminder
        INFOPLIST_FILE: SedentaryReminder/Resources/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        ENABLE_HARDENED_RUNTIME: NO
    info:
      path: SedentaryReminder/Resources/Info.plist
      properties:
        CFBundleName: SedentaryReminder
        CFBundleDisplayName: 久坐提醒
        CFBundleIdentifier: com.sedentary.reminder
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        CFBundlePackageType: APPL
        CFBundleExecutable: SedentaryReminder
        LSMinimumSystemVersion: "13.0"
        LSUIElement: true
        NSPrincipalClass: NSApplication
        NSHumanReadableCopyright: "Copyright © 2026. All rights reserved."
